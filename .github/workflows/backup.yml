name: Daily Backup

on:
  schedule:
    - cron: '0 11 * * *'   # 4am PDT (UTC-7)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Export data from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          mkdir -p backups

          python3 << 'PYEOF'
          import json, datetime, urllib.request, os

          url     = os.environ['SUPABASE_URL']
          key     = os.environ['SUPABASE_SERVICE_KEY']
          headers = {
              'apikey': key,
              'Authorization': f'Bearer {key}',
              'Content-Type': 'application/json',
          }

          # Paginate using id > last_id (keyset pagination) — stable, no duplicates
          seen   = {}
          last_id = ''
          limit  = 1000
          while True:
              filter_part = f'&id=gt.{last_id}' if last_id else ''
              req = urllib.request.Request(
                  f"{url}/rest/v1/albums?select=*&deleted_at=is.null&order=id.asc&limit={limit}{filter_part}",
                  headers=headers
              )
              with urllib.request.urlopen(req) as r:
                  batch = json.loads(r.read())
              for row in batch:
                  seen[row['id']] = row
              if len(batch) < limit:
                  break
              last_id = batch[-1]['id']

          def to_camel(row):
              return {
                  'id':           row.get('id', ''),
                  'artist':       row.get('artist', ''),
                  'album':        row.get('album', ''),
                  'date':         row.get('date', ''),
                  'rating':       row.get('rating'),
                  'notes':        row.get('notes'),
                  'artUrl':       row.get('art_url', ''),
                  'artFallback':  row.get('art_fallback', ''),
                  'mbid':         row.get('mbid', ''),
                  'wantToListen': row.get('want_to_listen', False) or False,
                  'hardToFind':   row.get('hard_to_find', False) or False,
                  'unmatched':    row.get('unmatched', False) or False,
                  'added':        row.get('added', 0),
              }

          albums = [to_camel(r) for r in seen.values()]
          # Sort by added desc to match app order
          albums.sort(key=lambda a: a['added'] or 0, reverse=True)

          out = {
              'exported_at': datetime.datetime.utcnow().isoformat() + 'Z',
              'album_count': len(albums),
              'albums':      albums,
          }
          with open('backups/latest.json', 'w') as f:
              json.dump(out, f, indent=2)
          print(f"Backed up {len(albums)} albums (no duplicates)")
          PYEOF

          DATE=$(date +%Y-%m-%d)
          cp backups/latest.json "backups/$DATE.json"
          find backups -name "????-??-??.json" -mtime +30 -delete

      - name: Commit backup
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "Backup $(date +%Y-%m-%d)"
          git push